name: CI-Serenity

permissions:
  contents: read
  actions: read

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:


jobs:
  test:
    runs-on: ubuntu-latest

    steps:

      # 📥 Checkout
      - name: 📥 Checkout código
        uses: actions/checkout@d467da6

      # ☕ Java
      - name: ☕ Configurar Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 11

      # 📦 Cache Maven
      - name: 📦 Cache Maven
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: maven-

      # 🌐 Chrome
      - name: 🌐 Instalar Google Chrome
        run: |
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable

      # 🔍 Chrome version
      - name: 🔍 Verificar Chrome
        run: google-chrome --version

      # 🧪 TESTS SERENITY
      - name: 🧪 Ejecutar pruebas Serenity
        id: tests
        run: |
          set +e

          echo "⏱️ Iniciando medición..."
          START_TIME=$(date +%s)

          mvn clean verify
          EXIT_CODE=$?

          END_TIME=$(date +%s)
          DURATION=$((END_TIME - START_TIME))

          echo "⏱️ Duración total: $DURATION segundos"

          # Contar resultados desde reportes JUnit
          PASSED=$(grep -o 'tests="[0-9]*"' target/surefire-reports/*.xml | awk -F'"' '{sum+=$2} END {print sum}')
          FAILED=$(grep -o 'failures="[0-9]*"' target/surefire-reports/*.xml | awk -F'"' '{sum+=$2} END {print sum}')

          echo "✅ Passed: $PASSED"
          echo "❌ Failed: $FAILED"

          # Guardar variables
          echo "TEST_PASSED=$PASSED" >> $GITHUB_ENV
          echo "TEST_FAILED=$FAILED" >> $GITHUB_ENV
          echo "TEST_DURATION=$DURATION" >> $GITHUB_ENV

          if [ $EXIT_CODE -ne 0 ]; then
            echo "TESTS_FAILED=true" >> $GITHUB_ENV
          else
            echo "TESTS_FAILED=false" >> $GITHUB_ENV
          fi

          exit $EXIT_CODE

      # 📊 Reporte Serenity
      - name: 📊 Generar reporte Serenity
        if: always()
        run: mvn serenity:aggregate

      # 📁 Reporte
      - name: 📁 Subir reporte Serenity
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: serenity-report
          path: target/site/serenity/

      # 📸 Screenshots
      - name: 📸 Subir screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: screenshots
          path: target/site/serenity/

      # 📡 GRAFANA (MEJORADO CON MÉTRICAS REALES)
      - name: 📡 Enviar métricas a Grafana
        if: always()
        env:
          GRAFANA_URL: ${{ secrets.GRAFANA_URL }}
          GRAFANA_TOKEN: ${{ secrets.GRAFANA_TOKEN }}
        run: |
          echo "📡 Enviando métricas a Grafana..."

          TIMESTAMP=$(date +%s%N)

          LOG="test_passed=${TEST_PASSED} test_failed=${TEST_FAILED} duration=${TEST_DURATION}"

          echo "Payload: $LOG"

          curl -X POST "$GRAFANA_URL" \
          -H "Authorization: Basic $GRAFANA_TOKEN" \
          -H "Content-Type: application/json" \
          -d "{
            \"streams\": [
              {
                \"stream\": {
                  \"job\": \"serenity-tests\"
                },
                \"values\": [
                  [\"$TIMESTAMP\", \"$LOG\"]
                ]
              }
            ]
          }"
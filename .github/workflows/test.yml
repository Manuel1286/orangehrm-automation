name: 🧪 CI OrangeHRM - Serenity + Grafana

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      # 📥 Checkout
      - name: 📥 Checkout código
        uses: actions/checkout@v4

      # ☕ Java
      - name: ☕ Configurar Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 11

      # 📦 Cache Maven
      - name: 📦 Cache Maven
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: maven-

      # 🌐 Instalar Chrome
      - name: 🌐 Instalar Google Chrome
        run: |
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable

      # 🔍 Verificar Chrome
      - name: 🔍 Verificar Chrome
        run: google-chrome --version

      # 🧪 Ejecutar pruebas
      - name: 🧪 Ejecutar pruebas Serenity
        id: tests
        run: |
          mvn clean verify || echo "TESTS_FAILED=true" >> $GITHUB_ENV

      # 📊 Generar reporte Serenity
      - name: 📊 Generar reporte Serenity
        if: always()
        run: mvn serenity:aggregate

      # 📁 Subir reporte
      - name: 📁 Subir reporte como artefacto
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: reporte-serenity
          path: target/site/serenity/

      # 📸 Subir screenshots
      - name: 📸 Subir screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: screenshots
          path: target/site/serenity/*.png

      # 🔥 ENVIAR LOGS A GRAFANA (CORREGIDO)
      - name: 📡 Enviar logs a Grafana Loki
        if: always()
        env:
          GRAFANA_TOKEN: ${{ secrets.GRAFANA_TOKEN }}
        run: |
          STATUS=${TESTS_FAILED:-false}
          TIMESTAMP=$(date +%s%N)

          echo "Estado de tests: $STATUS"

          curl -X POST "https://logs-prod-us-east-3.grafana.net/loki/api/v1/push" \
          -H "Authorization: Basic $GRAFANA_TOKEN" \
          -H "Content-Type: application/json" \
          -d "{
            \"streams\": [
              {
                \"stream\": {
                  \"job\": \"serenity-tests\",
                  \"project\": \"orangehrm\",
                  \"branch\": \"${{ github.ref_name }}\"
                },
                \"values\": [
                  [ \"$TIMESTAMP\", \"Serenity execution finished | status=$STATUS | commit=${{ github.sha }}\" ]
                ]
              }
            ]
          }"
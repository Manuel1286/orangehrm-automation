name: 🧪 CI OrangeHRM - Serenity + Grafana

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:

      # 📥 Checkout
      - name: 📥 Checkout código
        uses: actions/checkout@v4

      # ☕ Java
      - name: ☕ Configurar Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 11

      # 📦 Cache Maven
      - name: 📦 Cache Maven
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: maven-

      # 🌐 Chrome
      - name: 🌐 Instalar Google Chrome
        run: |
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable

      # 🔍 Chrome version
      - name: 🔍 Verificar Chrome
        run: google-chrome --version

      # 🧪 TESTS SERENITY
      - name: 🧪 Ejecutar pruebas Serenity
        id: tests
        run: |
          set +e
          mvn clean verify
          EXIT_CODE=$?
          
          if [ $EXIT_CODE -ne 0 ]; then
            echo "TESTS_FAILED=true" >> $GITHUB_ENV
          else
            echo "TESTS_FAILED=false" >> $GITHUB_ENV
          fi

          exit $EXIT_CODE

      # 📊 Reporte Serenity
      - name: 📊 Generar reporte Serenity
        if: always()
        run: mvn serenity:aggregate

      # 📁 Reporte
      - name: 📁 Subir reporte Serenity
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: serenity-report
          path: target/site/serenity/

      # 📸 Screenshots
      - name: 📸 Subir screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: screenshots
          path: target/site/serenity/

      # 🧪 TEST GRAFANA (VALIDACIÓN SEGURA)
      - name: 🧪 Test conexión Grafana
        if: always()
        env:
          GRAFANA_URL: ${{ secrets.GRAFANA_URL }}
          GRAFANA_TOKEN: ${{ secrets.GRAFANA_TOKEN }}
        run: |
          echo "Probando conexión a Grafana..."

          TIMESTAMP=$(date +%s%N)

          curl -v -X POST "$GRAFANA_URL" \
          -H "Authorization: Basic $GRAFANA_TOKEN" \
          -H "Content-Type: application/json" \
          -d '{
            "streams": [
              {
                "stream": {
                  "job": "test-manual"
                },
                "values": [
                  ["'"$TIMESTAMP"'", "mensaje de prueba desde github actions"]
                ]
              }
            ]
          }'
serenity {

  project.name = "OrangeHRM Automation"

  take.screenshots = BEFORE_AND_AFTER_EACH_STEP

  logging = VERBOSE

  console.colors = true

  report.show.step.details = true
}

webdriver {
  driver = chrome
  autodownload = true

  capabilities {
    "goog:chromeOptions" {
      args = [
        "start-maximized",
        "disable-infobars",
        "disable-notifications"
      ]
    }
  }
}
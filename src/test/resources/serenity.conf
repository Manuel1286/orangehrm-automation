serenity {

  project.name = "OrangeHRM Automation"

  take.screenshots = BEFORE_AND_AFTER_EACH_STEP

  logging = VERBOSE

  console.colors = true

  report.show.step.details = true
}

webdriver {
  driver = chrome
  autodownload = true

  capabilities {
    "goog:chromeOptions" {
      args = [
        "--headless=false",
        "--no-sandbox",
        "--disable-dev-shm-usage",
        "--remote-allow-origins=*",
        "--window-size=1920,1080"
      ]
    }
  }
}